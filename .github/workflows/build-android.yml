name: Build Android APK

# ─── When to run ─────────────────────────────────────────────────────────────
on:
  push:
    branches: [ main, master ]       # Auto-build on every push
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:                  # Also allow manual trigger from GitHub UI

# ─── Build Job ────────────────────────────────────────────────────────────────
jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout code
      - name: ⬇️ Checkout repository
        uses: actions/checkout@v4

      # 2. Set up Node.js
      - name: 🟢 Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # 3. Set up Java 17 (required for Android builds)
      - name: ☕ Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # 4. Set up Android SDK
      - name: 🤖 Set up Android SDK
        uses: android-actions/setup-android@v3

      # 5. Install JS dependencies
      - name: 📦 Install dependencies
        run: npm ci

      # 6. Install Expo CLI
      - name: 🔧 Install Expo CLI
        run: npm install -g expo-cli @expo/cli

      # 7. Generate native Android project
      - name: 🏗️ Run expo prebuild
        run: npx expo prebuild --platform android --no-install
        env:
          EXPO_PUBLIC_API_URL: ${{ secrets.EXPO_PUBLIC_API_URL || 'http://localhost:5000' }}

      # 8. Copy optimized gradle.properties
      - name: ⚙️ Apply Gradle configuration
        run: |
          cp android-build-config/gradle.properties android/gradle.properties

      # 9. Cache Gradle dependencies (speeds up future builds)
      - name: 📂 Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      # 10. Make gradlew executable
      - name: 🔑 Make gradlew executable
        run: chmod +x android/gradlew

      # 11. Build APK
      - name: 🔨 Build Release APK
        run: |
          cd android
          ./gradlew assembleRelease --no-daemon
        env:
          GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx3g"

      # 12. Upload APK as a downloadable artifact
      - name: 📤 Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Aronium-POS-Report-${{ github.run_number }}
          path: android/app/build/outputs/apk/release/app-release.apk
          retention-days: 30        # APK available to download for 30 days

      # 13. Show success summary
      - name: ✅ Build Summary
        run: |
          APK_SIZE=$(du -h android/app/build/outputs/apk/release/app-release.apk | cut -f1)
          echo "## ✅ APK Build Successful!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Detail | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| APK Size | $APK_SIZE |" >> $GITHUB_STEP_SUMMARY
          echo "| Build Number | ${{ github.run_number }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | ${{ github.sha }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "⬇️ Download the APK from the **Artifacts** section above." >> $GITHUB_STEP_SUMMARY
