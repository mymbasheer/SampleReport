# ─── Android Build Configuration ─────────────────────────────────────────────
# Copy this file to android/gradle.properties after running expo prebuild

# Build performance
org.gradle.jvmargs=-Xmx4096m -XX:MaxMetaspaceSize=512m
org.gradle.parallel=true
org.gradle.caching=true
org.gradle.configureondemand=true

# Android
android.useAndroidX=true
android.enableJetifier=true
android.nonTransitiveRClass=true

# React Native
reactNativeArchitectures=arm64-v8a,armeabi-v7a,x86,x86_64
newArchEnabled=false
hermesEnabled=true

# Keystore — fill these in for a signed release build
# MYAPP_RELEASE_STORE_FILE=bizledger-release.keystore
# MYAPP_RELEASE_KEY_ALIAS=bizledger
# MYAPP_RELEASE_STORE_PASSWORD=your_store_password
# MYAPP_RELEASE_KEY_PASSWORD=your_key_password
